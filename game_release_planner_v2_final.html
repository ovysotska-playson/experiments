<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Release Planner v2 · Playson QA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #1f1f25;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #444;
    --purple: #7c6af7;
    --teal: #2dd4a0;
    --amber: #f0a43a;
    --red: #f05a5a;
    --green: #3dca7e;
    --blue: #5aabf0;
    --mono: 'DM Mono', 'Fira Mono', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
    --radius: 10px;
  }
  body.light {
    --bg: #f4f4f6; --surface: #fff; --surface2: #f0f0f3;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
    --text: #111; --text2: #666; --text3: #aaa;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 14px; line-height: 1.6;
    min-height: 100vh; padding: 2rem 1rem 5rem;
    transition: background 0.2s, color 0.2s;
  }
  .container { max-width: 820px; margin: 0 auto; }

  /* HEADER */
  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border);
  }
  .logo { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--purple); text-transform: uppercase; margin-bottom: 4px; }
  h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.02em; }
  .subtitle { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .theme-toggle {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
    padding: 7px 12px; font-family: var(--mono); font-size: 11px; color: var(--text2);
    cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s; flex-shrink: 0; margin-top: 4px;
  }
  .theme-toggle:hover { color: var(--text); }

  /* ROLE FILTER BAR */
  .role-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 1.25rem; align-items: center;
  }
  .role-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-right: 4px; }
  .role-btn {
    border: 1px solid var(--border2); border-radius: 20px;
    padding: 5px 13px; font-size: 12px; font-family: var(--mono);
    letter-spacing: 0.04em; cursor: pointer; transition: all 0.18s;
    background: var(--surface); color: var(--text2);
  }
  .role-btn:hover { color: var(--text); border-color: var(--border2); }
  .role-btn.active { color: #fff; border-color: transparent; }

  /* INPUTS */
  .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
  .game-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; font-family: var(--sans); font-size: 15px; font-weight: 500; color: var(--text); outline: none; margin-bottom: 1rem; transition: border-color 0.2s; }
  .game-input::placeholder { color: var(--text3); }
  .game-input:focus { border-color: var(--purple); }
  .dates-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
  .date-field { display: flex; flex-direction: column; gap: 5px; }
  .date-field label { font-size: 10px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .date-field input[type="date"] { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 11px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; color-scheme: dark; width: 100%; }
  body.light .date-field input[type="date"] { color-scheme: light; }

  /* OUTPUT */
  .output { display: none; }
  .output.visible { display: block; }

  /* WARNINGS */
  .warnings { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1rem; }
  .warning { background: rgba(240,90,90,0.08); border: 1px solid rgba(240,90,90,0.2); border-radius: 8px; padding: 9px 13px; font-size: 12px; color: #f09090; display: flex; gap: 8px; align-items: flex-start; }

  /* TIMELINE */
  .tl-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
  .tl-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .tl-game { font-size: 14px; font-weight: 500; }
  .tl-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }

  /* FILTERABLE BLOCKS — dimmed when filter active and not relevant */
  .tl-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); transition: opacity 0.2s; }
  .tl-row:last-child { border-bottom: none; }
  .ms-row { display: flex; align-items: center; gap: 10px; padding: 10px 1.5rem; border-bottom: 1px solid var(--border); transition: opacity 0.2s; }
  .ms-row:last-child { border-bottom: none; }

  /* dim class applied by JS */
  .dim { opacity: 0.18; }
  .highlight { opacity: 1; }

  .tl-accent { width: 3px; flex-shrink: 0; }
  .tl-body { flex: 1; padding: 1rem 1.5rem; }
  .tl-phase-name { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .badge { font-family: var(--mono); font-size: 10px; padding: 1px 7px; border-radius: 4px; font-weight: 400; }
  .tl-phase-note { font-size: 12px; color: var(--text2); margin-bottom: 8px; }

  .ms-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ms-label { font-size: 13px; color: var(--text2); font-family: var(--mono); letter-spacing: 0.03em; min-width: 240px; }
  .ms-label.primary { color: var(--text); font-weight: 700; font-size: 14px; }
  .ms-date { font-size: 14px; font-family: var(--mono); font-weight: 500; }
  .ms-date.primary { font-size: 15px; font-weight: 700; }
  .ms-day { font-size: 12px; color: var(--text3); margin-left: 7px; }
  .ms-chip { margin-left: auto; font-size: 10px; font-family: var(--mono); color: var(--text3); background: var(--surface2); padding: 2px 7px; border-radius: 4px; white-space: nowrap; }

  /* GATE BLOCK */
  /* PHASE INNER MILESTONES */
  .phase-inner-milestones { display: flex; flex-direction: column; gap: 4px; margin: 10px 0 6px; }
  .pim-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface2);
    transition: opacity 0.2s;
    font-size: 12px;
  }
  .pim-row.dim { opacity: 0.15; }
  .pim-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pim-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; min-width: 52px; flex-shrink: 0; }
  .pim-name { color: var(--text); font-weight: 500; flex: 1; }
  .pim-date { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); flex-shrink: 0; }
  .pim-day { font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .pim-chip { margin-left: auto; font-size: 10px; font-family: var(--mono); color: var(--text3); background: var(--bg); padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }

  .gate-block { border-radius: 8px; padding: 10px 13px; display: flex; gap: 10px; align-items: flex-start; margin-top: 6px; }
  .gate-arrow { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .gate-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin-bottom: 2px; }
  .gate-date { font-size: 15px; font-weight: 500; font-family: var(--mono); }
  .gate-weekday { font-size: 11px; opacity: 0.55; margin-left: 7px; font-family: var(--sans); font-weight: 400; }
  .gate-desc { font-size: 11px; opacity: 0.65; margin-top: 2px; }

  /* ROLE CHECKLIST inside gate */
  .role-checklist { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
  .role-item { display: flex; gap: 8px; align-items: flex-start; font-size: 11px; color: var(--text2); padding: 5px 8px; border-radius: 6px; transition: background 0.15s, color 0.15s; }
  .role-item .ri-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; font-weight: 600; }
  .role-item .ri-text { line-height: 1.4; }
  /* highlighted role item */
  .role-item.lit { color: var(--text); }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 1rem; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; }
  .sum-label { font-size: 10px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .sum-value { font-size: 22px; font-weight: 500; font-family: var(--mono); }
  .sum-unit { font-size: 11px; color: var(--text2); font-family: var(--sans); font-weight: 400; margin-left: 3px; }

  .actions { display: flex; gap: 8px; }
  .btn { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 14px; font-family: var(--sans); font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .btn:hover { color: var(--text); background: var(--surface2); }
  .btn.ok { color: var(--green); border-color: rgba(61,202,126,0.3); }

  @media (max-width: 540px) { .dates-row { grid-template-columns: 1fr; } .ms-label { min-width: 140px; } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="logo">Playson · QA</div>
      <h1>Game Release Planner</h1>
      <p class="subtitle">Enter milestone dates · filter by role to see responsibilities</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀ LIGHT</button>
  </header>

  <!-- ROLE FILTER BAR -->
  <div class="role-bar">
    <span class="role-label">Filter by role</span>
    <button class="role-btn" data-role="qa"      style="--rc:#7c6af7" onclick="toggleRole('qa')">QA</button>
    <button class="role-btn" data-role="client"  style="--rc:#5aabf0" onclick="toggleRole('client')">Client Dev</button>
    <button class="role-btn" data-role="math"    style="--rc:#2dd4a0" onclick="toggleRole('math')">Math / BE</button>
    <button class="role-btn" data-role="anim"    style="--rc:#f0a43a" onclick="toggleRole('anim')">Animation</button>
    <button class="role-btn" data-role="design"  style="--rc:#f05a5a" onclick="toggleRole('design')">Design</button>
    <button class="role-btn" data-role="content" style="--rc:#c084fc" onclick="toggleRole('content')">Content</button>
  </div>

  <div class="input-card">
    <input type="text" class="game-input" id="gameName" placeholder="Game name..." />
    <div class="dates-row">
      <div class="date-field">
        <label><span class="dot" style="background:#7c6af7"></span>Cert start</label>
        <input type="date" id="certStart" />
      </div>
      <div class="date-field">
        <label><span class="dot" style="background:#2dd4a0"></span>Pre-release date</label>
        <input type="date" id="preRelease" />
      </div>
      <div class="date-field">
        <label><span class="dot" style="background:#f0a43a"></span>Official release date</label>
        <input type="date" id="release" />
      </div>
    </div>
  </div>

  <div class="output" id="output"></div>
</div>

<script>
const CERT_DAYS = 35, MKTG_DAYS = 21, PREREL_DAYS = 14, GATE_BUFFER = 2;

// ROLE DEFINITIONS per gate/milestone
// Each entry: { roles: [...], text: '...' }
const GATE1_ROLES = [
  { roles: ['client'],  text: 'All critical issues fixed, no crashes or internal errors, Hand History ready' },
  { roles: ['anim'],   text: 'Raw animations are present' },
  { roles: ['content'],text: '10 days before cert: high-priority translations ready · 3 days before cert: game guides ready' },
  { roles: ['design'], text: 'Paytable images ready' },
  { roles: ['qa'],     text: 'All cert runs passed, Hand History tested & released, client sanity done' },
  { roles: ['math'],   text: 'PRs merged to master, all links and files ready' },
];
const GATE2_ROLES = [
  { roles: ['client'],  text: 'All critical & UI issues fixed, sounds/timing correct, asset optimisation done 2 days before gate' },
  { roles: ['anim'],   text: 'Animation polishing, bugfixes, timing fixes' },
  { roles: ['content'],text: 'Mid-priority translations ready 1 week after cert start · paytable & game bugfixes' },
  { roles: ['qa'],     text: 'All bugs tested, optimisation verified on 2 platforms, BE services released · after gate: regression + client release to prod + perf test on low-end devices' },
  { roles: ['math'],   text: 'Fixing & investigating cert issues if present' },
];
const GATE3_ROLES = [
  { roles: ['client'],  text: 'Active bugfixing, possible second round of asset optimisation done' },
  { roles: ['anim'],   text: 'Minor bugfixes to make client perfect' },
  { roles: ['content'],text: 'Minor bugfixes if needed' },
  { roles: ['design'], text: 'Minor bugfixes to make client perfect' },
  { roles: ['qa'],     text: 'All bugfixes verified, Expo Go tested, cross-browser done, perf test on flagship devices · 2 days after gate: regression + client deployment' },
  { roles: ['math'],   text: 'No active work at this stage' },
];
const MKTG_ROLES = ['design']; // marketing assets milestone belongs to design

// ROLE COLORS
const ROLE_COLORS = {
  qa: '#7c6af7', client: '#5aabf0', math: '#2dd4a0',
  anim: '#f0a43a', design: '#f05a5a', content: '#c084fc'
};
const ROLE_LABELS = {
  qa: 'QA', client: 'Client Dev', math: 'Math/BE',
  anim: 'Animation', design: 'Design', content: 'Content'
};

let activeRole = null;

function toggleRole(role) {
  activeRole = activeRole === role ? null : role;
  // update button styles
  document.querySelectorAll('.role-btn').forEach(btn => {
    const r = btn.dataset.role;
    const color = ROLE_COLORS[r];
    if (activeRole === r) {
      btn.classList.add('active');
      btn.style.background = color;
      btn.style.color = '#fff';
      btn.style.borderColor = color;
    } else {
      btn.classList.remove('active');
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
    }
  });
  applyFilter();
}

function applyFilter() {
  if (!activeRole) {
    // clear all dim/highlight
    document.querySelectorAll('[data-roles]').forEach(el => {
      el.classList.remove('dim', 'highlight');
    });
    // show all role items
    document.querySelectorAll('.role-item').forEach(el => {
      el.style.display = '';
      el.classList.remove('lit');
    });
    // reset pim-rows
    document.querySelectorAll('.pim-row').forEach(el => {
      el.classList.remove('dim');
      el.style.borderColor = '';
      el.style.background = '';
    });
    return;
  }

  document.querySelectorAll('[data-roles]').forEach(el => {
    const roles = el.dataset.roles.split(',');
    const relevant = roles.includes(activeRole) || roles.includes('all');
    el.classList.toggle('dim', !relevant);
    el.classList.toggle('highlight', relevant);
  });

  // highlight matching role items inside checklists
  document.querySelectorAll('.role-item').forEach(el => {
    const roles = el.dataset.roles ? el.dataset.roles.split(',') : [];
    const match = roles.includes(activeRole);
    el.classList.toggle('lit', match);
    el.style.background = match ? ROLE_COLORS[activeRole] + '18' : '';
  });

  // handle pim-rows (inner phase milestones)
  document.querySelectorAll('.pim-row').forEach(el => {
    const roles = el.dataset.roles ? el.dataset.roles.split(',') : [];
    const relevant = roles.includes(activeRole) || roles.includes('all');
    el.classList.toggle('dim', !relevant);
    if (relevant && roles.includes(activeRole)) {
      el.style.borderColor = ROLE_COLORS[activeRole] + '60';
      el.style.background = ROLE_COLORS[activeRole] + '12';
    } else {
      el.style.borderColor = '';
      el.style.background = '';
    }
  });
}

// DATE HELPERS
function parseDate(str) { if (!str) return null; const [y,m,d]=str.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(date,n) { const d=new Date(date); d.setDate(d.getDate()+n); return d; }
function subDays(date,n) { return addDays(date,-n); }
function diffDays(a,b) { return Math.round((b-a)/(1000*60*60*24)); }
function fmtDate(d) { if(!d) return '—'; return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDay(d) { return d.toLocaleDateString('en-GB',{weekday:'long'}); }
function isWeekend(d) { const w=d.getDay(); return w===0||w===6; }
function prevWorkday(d) { const r=new Date(d); while(r.getDay()===0||r.getDay()===6) r.setDate(r.getDate()-1); return r; }

function roleChecklist(items) {
  return `<div class="role-checklist">${items.map(item => {
    const roleStr = item.roles.join(',');
    const color = ROLE_COLORS[item.roles[0]];
    const label = item.roles.map(r => ROLE_LABELS[r]).join(', ');
    return `<div class="role-item" data-roles="${roleStr}" style="border-left: 2px solid ${color}30;">
      <span class="ri-badge" style="background:${color}20;color:${color}">${label}</span>
      <span class="ri-text">${item.text}</span>
    </div>`;
  }).join('')}</div>`;
}

function gateBlock(tag, color, bg, date, desc, roleItems, gateRoles) {
  const wknd = isWeekend(date) ? ` <span style="color:#f05a5a;font-size:10px;">⚠ weekend</span>` : '';
  const rolesAttr = gateRoles.join(',');
  return `<div class="gate-block" data-roles="${rolesAttr}" style="background:${bg};border:1px solid ${color}22;">
    <div class="gate-arrow" style="color:${color}">▸</div>
    <div style="flex:1">
      <div class="gate-tag" style="color:${color}">${tag}</div>
      <div class="gate-date" style="color:${color}">${fmtDate(date)}<span class="gate-weekday">${fmtDay(date)}${wknd}</span></div>
      <div class="gate-desc">${desc}</div>
      ${roleChecklist(roleItems)}
    </div>
  </div>`;
}

function msRow(color, label, date, chip, primary=false, roles='all') {
  const wknd = isWeekend(date) ? `<span style="color:#f05a5a;font-size:10px;margin-left:6px;">⚠ weekend</span>` : '';
  const lc = primary ? 'ms-label primary' : 'ms-label';
  const dc = primary ? 'ms-date primary' : 'ms-date';
  const dotSize = primary ? 'width:10px;height:10px;' : '';
  return `<div class="ms-row" data-roles="${roles}">
    <div class="ms-dot" style="background:${color};${dotSize}"></div>
    <div class="${lc}">${label}</div>
    <div class="${dc}">${fmtDate(date)}<span class="ms-day">${fmtDay(date)}</span>${wknd}</div>
    ${chip ? `<div class="ms-chip">${chip}</div>` : ''}
  </div>`;
}

function phaseRow(accentColor, content, roles) {
  return `<div class="tl-row" data-roles="${roles}">
    <div class="tl-accent" style="background:${accentColor}"></div>
    <div class="tl-body">${content}</div>
  </div>`;
}

function render() {
  const name = document.getElementById('gameName').value.trim() || 'Game';
  const certStart = parseDate(document.getElementById('certStart').value);
  const preRelDate = parseDate(document.getElementById('preRelease').value);
  const relDate = parseDate(document.getElementById('release').value);
  const out = document.getElementById('output');

  if (!certStart || !preRelDate || !relDate) {
    out.classList.remove('visible'); out.innerHTML = ''; return;
  }

  const mktgDate = addDays(certStart, MKTG_DAYS);
  const certReady = addDays(certStart, CERT_DAYS);
  const gate1 = prevWorkday(subDays(certStart, GATE_BUFFER));
  const gate2 = prevWorkday(subDays(preRelDate, GATE_BUFFER));
  const gate3 = prevWorkday(subDays(relDate, GATE_BUFFER));

  const warns = [];
  if (isWeekend(certStart)) warns.push(`⛔ Cert start falls on a ${fmtDay(certStart)} — must be a working day.`);
  if (isWeekend(preRelDate)) warns.push(`⛔ Pre-release date falls on a ${fmtDay(preRelDate)} — must be a working day.`);
  if (isWeekend(relDate)) warns.push(`⛔ Official release date falls on a ${fmtDay(relDate)} — must be a working day.`);
  const preRelDuration = diffDays(preRelDate, relDate);
  if (preRelDuration !== PREREL_DAYS) warns.push(`Pre-release is ${preRelDuration} days — expected ${PREREL_DAYS}.`);
  const certDuration = diffDays(certStart, preRelDate);
  if (certDuration < CERT_DAYS) warns.push(`Only ${certDuration} days between cert start and pre-release — certification usually takes ${CERT_DAYS} days.`);
  if (certStart >= preRelDate) warns.push('Cert start is after or equal to pre-release — check your dates.');
  if (preRelDate >= relDate) warns.push('Pre-release is after or equal to release — check your dates.');

  const warnsHtml = warns.length
    ? `<div class="warnings">${warns.map(w=>`<div class="warning"><span style="flex-shrink:0">⚠</span><span>${w}</span></div>`).join('')}</div>`
    : '';

  const totalDays = diffDays(gate1, relDate);
  const gate1Roles = [...new Set(GATE1_ROLES.flatMap(i=>i.roles))].join(',');
  const gate2Roles = [...new Set(GATE2_ROLES.flatMap(i=>i.roles))].join(',');
  const gate3Roles = [...new Set(GATE3_ROLES.flatMap(i=>i.roles))].join(',');

  out.innerHTML = `
    ${warnsHtml}
    <div class="tl-card">
      <div class="tl-header">
        <span class="tl-game">${name}</span>
        <span class="tl-label">Release Plan v2</span>
      </div>

      ${phaseRow('#7c6af7', `
        <div class="tl-phase-name"><span style="color:#7c6af7">◆</span> Phase 1 — Development & Pre-cert</div>
        <div class="tl-phase-note">Math review + mandatory test runs must be completed before Gate 1</div>
        ${gateBlock('Gate 1 — Pre-cert quality gate','#7c6af7','rgba(124,106,247,0.07)',gate1,`QA regression + sign-off → cert submission ${fmtDate(certStart)}`,GATE1_ROLES,gate1Roles.split(','))}
      `, gate1Roles)}

      ${msRow('#7c6af799','Cert start (game client checklist passed)',certStart,'',true,'all')}

      ${phaseRow('#2dd4a0', `
        <div class="tl-phase-name"><span style="color:#2dd4a0">◆</span> Phase 2 — Polishing <span class="badge" style="background:rgba(45,212,160,0.1);color:#2dd4a0;">parallel with cert</span></div>
        <div class="tl-phase-note">Polishing runs while certification is in progress</div>
        <div class="phase-inner-milestones">
          <div class="pim-row" data-roles="design">
            <span class="pim-dot" style="background:#f05a5a"></span>
            <span class="pim-label" style="color:#f05a5a">Design</span>
            <span class="pim-name">Marketing assets ready</span>
            <span class="pim-date">${fmtDate(mktgDate)}</span>
            <span class="pim-day">${fmtDay(mktgDate)}</span>
            <span class="pim-chip">+${MKTG_DAYS} days from cert start</span>
          </div>
          <div class="pim-row" data-roles="all">
            <span class="pim-dot" style="background:rgba(124,106,247,0.4)"></span>
            <span class="pim-label" style="color:var(--text3)">All</span>
            <span class="pim-name">Certs ready (expected)</span>
            <span class="pim-date">${fmtDate(certReady)}</span>
            <span class="pim-day">${fmtDay(certReady)}</span>
            <span class="pim-chip">+${CERT_DAYS} days from cert start</span>
          </div>
        </div>
        ${gateBlock('Gate 2 — Pre-release quality gate','#2dd4a0','rgba(45,212,160,0.07)',gate2,`QA regression + sign-off → pre-release ${fmtDate(preRelDate)}`,GATE2_ROLES,gate2Roles.split(','))}
      `, gate2Roles + ',design')}

      ${msRow('#2dd4a0','Pre-release (soft launch)',preRelDate,`${preRelDuration} days until release`,true,'all')}

      ${phaseRow('#f0a43a', `
        <div class="tl-phase-name"><span style="color:#f0a43a">◆</span> Phase 3 — Pre-release monitoring <span class="badge" style="background:rgba(240,164,58,0.1);color:#f0a43a;">${PREREL_DAYS} days</span></div>
        <div class="tl-phase-note">Monitoring, hotfixes, metrics collection</div>
        ${gateBlock('Gate 3 — Release quality gate','#f0a43a','rgba(240,164,58,0.07)',gate3,`QA sign-off → official release ${fmtDate(relDate)}`,GATE3_ROLES,gate3Roles.split(','))}
      `, gate3Roles)}

      ${msRow('#f0a43a','🚀 Official Release',relDate,`total ${totalDays} days pipeline`,true,'all')}
    </div>

    <div class="summary-grid">
      <div class="sum-card"><div class="sum-label">Cert duration</div><div class="sum-value" style="color:#7c6af7">${CERT_DAYS}<span class="sum-unit">days</span></div></div>
      <div class="sum-card"><div class="sum-label">Mktg assets</div><div class="sum-value" style="color:#5aabf0">${MKTG_DAYS}<span class="sum-unit">days</span></div></div>
      <div class="sum-card"><div class="sum-label">Pre-release</div><div class="sum-value" style="color:${preRelDuration===PREREL_DAYS?'#f0a43a':'#f05a5a'}">${preRelDuration}<span class="sum-unit">days</span></div></div>
      <div class="sum-card"><div class="sum-label">Total pipeline</div><div class="sum-value" style="color:#888">${totalDays}<span class="sum-unit">days</span></div></div>
    </div>
    <div class="actions"><button class="btn" id="copyBtn" onclick="copyPlan()">⎘ Copy plan</button></div>
  `;

  window._planText = `${name} — Release Plan\n${'─'.repeat(48)}\nGate 1: ${fmtDate(gate1)}\nCert start: ${fmtDate(certStart)}\nMarketing assets: ${fmtDate(mktgDate)}\nCerts ready: ${fmtDate(certReady)}\nGate 2: ${fmtDate(gate2)}\nPre-release: ${fmtDate(preRelDate)}\nGate 3: ${fmtDate(gate3)}\nRelease: ${fmtDate(relDate)}`;
  out.classList.add('visible');
  applyFilter();
}

function copyPlan() {
  navigator.clipboard.writeText(window._planText||'').then(()=>{
    const btn=document.getElementById('copyBtn'); if(!btn) return;
    btn.classList.add('ok'); btn.textContent='✓ Copied';
    setTimeout(()=>{ btn.classList.remove('ok'); btn.innerHTML='⎘ Copy plan'; },2000);
  });
}
function toggleTheme() {
  const light=document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent=light?'☾ DARK':'☀ LIGHT';
}
['certStart','preRelease','release'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('gameName').addEventListener('input',render);
</script>
</body>
</html>
